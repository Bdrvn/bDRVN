<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Inschrijven</h3>
      <p id="modalSub">Vul je gegevens in en we nemen snel contact op.</p>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  // NAV
  function toggleMenu(){
    document.getElementById('hamburger').classList.toggle('open');
    document.getElementById('mobNav').classList.toggle('open');
  }
  function closeMenu(){
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('mobNav').classList.remove('open');
  }

  // MODAL
  function openModal(plan){
    const opts = ['Gratis Proefles','Starter — €80/maand','Pro — €95/maand','Elite — €110/maand','Flex Card — 10 credits / 3 maanden'];
    document.getElementById('modalTitle').textContent = plan==='Gratis Proefles'?'Gratis proefles':'Inschrijven';
    document.getElementById('modalSub').textContent = 'Vul je gegevens in en we nemen snel contact op.';
    document.getElementById('modalBody').innerHTML=`
      <div class="form-row">
        <div class="form-group"><label>Voornaam</label><input type="text" placeholder="Jan"/></div>
        <div class="form-group"><label>Achternaam</label><input type="text" placeholder="Janssen"/></div>
      </div>
      <div class="form-group"><label>E-mailadres</label><input type="email" placeholder="jan@email.com"/></div>
      <div class="form-group"><label>Formule</label><select>${opts.map(o=>`<option${o.startsWith(plan)?' selected':''}>${o}</option>`).join('')}</select></div>
      <button class="modal-submit" onclick="submitForm()">Verstuur aanvraag</button>`;
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
  function submitForm(){
    document.getElementById('modalBody').innerHTML=`<div class="modal-success"><div class="check">✅</div><h3>Aanvraag ontvangen!</h3><p>Bedankt! We nemen zo snel mogelijk contact met je op via e-mail.</p></div>`;
    document.getElementById('modalTitle').textContent='Gelukt!';
    document.getElementById('modalSub').textContent='';
    setTimeout(closeModal,3000);
  }

  // SLIDESHOW
  let cur=0;
  const slides=document.querySelectorAll('.slide');
  const dotsEl=document.getElementById('dots');
  slides.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=()=>goTo(i);
    dotsEl.appendChild(d);
  });
  function goTo(n){
    slides[cur].classList.remove('active');
    dotsEl.children[cur].classList.remove('active');
    cur=(n+slides.length)%slides.length;
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
  }
  function moveSlide(d){goTo(cur+d);}
  setInterval(()=>moveSlide(1),4500);

  // FADE IN
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:0.12});
  document.querySelectorAll('.fi').forEach(el=>obs.observe(el));
</script>
</body>
