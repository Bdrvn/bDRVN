<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DRVN Gym</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--accent:#CC0000;--dark:#111;--light:#f9f9f9;--gray:#888;--border:#e5e5e5}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,sans-serif;color:var(--dark);background:#fff}

  /* FADE IN */
  .fi{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
  .fi.vis{opacity:1;transform:translateY(0)}
  .fi-d1{transition-delay:.1s} .fi-d2{transition-delay:.2s} .fi-d3{transition-delay:.3s} .fi-d4{transition-delay:.4s} .fi-d5{transition-delay:.5s} .fi-d6{transition-delay:.6s}

  /* NAV */
  nav{position:fixed;top:0;width:100%;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);z-index:999;border-bottom:1px solid var(--border)}
  .nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .nav-links{display:flex;gap:28px;list-style:none}
  .nav-links a{text-decoration:none;color:var(--dark);font-size:.85rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover{color:var(--accent)}
  .nav-cta{background:var(--accent);color:#fff;padding:10px 22px;border-radius:6px;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:opacity .2s;white-space:nowrap}
  .nav-cta:hover{opacity:.85}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px}
  .hamburger span{display:block;width:24px;height:2.5px;background:var(--dark);border-radius:2px;transition:all .3s}
  .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
  .hamburger.open span:nth-child(2){opacity:0}
  .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
  .mob-nav{display:none;position:fixed;top:64px;left:0;right:0;background:#fff;border-top:2px solid var(--accent);flex-direction:column;z-index:998;box-shadow:0 8px 24px rgba(0,0,0,.1)}
  .mob-nav.open{display:flex}
  .mob-nav a{padding:15px 28px;font-size:.9rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;color:var(--dark);border-bottom:1px solid var(--border);transition:color .2s}
  .mob-nav a:hover{color:var(--accent)}
  .mob-nav .mob-cta{margin:14px 24px 20px;background:var(--accent);color:#fff!important;text-align:center;border-radius:6px;padding:14px;border:none}

  /* HERO */
  #hero{height:100vh;background:var(--dark);display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
  .hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1600&auto=format&fit=crop') center/cover no-repeat;opacity:.3}
  .hero-content{position:relative;z-index:1;max-width:700px;padding:0 24px;animation:heroIn .9s ease both}
  @keyframes heroIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
  .hero-tag{display:inline-block;background:var(--accent);color:#fff;font-size:.75rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:6px 16px;border-radius:4px;margin-bottom:24px}
  .hero-title{font-size:clamp(3.5rem,10vw,7rem);font-weight:900;color:#fff;letter-spacing:8px;line-height:1;margin-bottom:20px}
  .hero-sub{color:#ccc;font-size:1.1rem;line-height:1.7;margin-bottom:40px}
  .btn{display:inline-block;background:var(--accent);color:#fff;padding:15px 36px;border-radius:6px;font-weight:700;font-size:.95rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn-outline{background:transparent;border:2px solid #fff;margin-left:12px;color:#fff}
  .btn-outline:hover{background:#fff;color:var(--dark);opacity:1}
  .hero-bottom{position:absolute;bottom:36px;left:0;right:0;z-index:2;display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:0 24px;animation:heroIn 1.1s ease both}
  .hero-badge{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#fff;padding:8px 18px;border-radius:30px;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .hero-badge .bv{color:var(--accent)}

  /* SECTIONS */
  section{padding:96px 24px}
  .container{max-width:1100px;margin:0 auto}
  .section-label{font-size:.72rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .section-title{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
  .section-sub{color:var(--gray);font-size:1rem;line-height:1.7;max-width:520px}

  /* VIDEO */
  #video{background:#000;padding:80px 24px;text-align:center}
  #video .section-label{color:var(--accent)}
  #video .section-title{color:#fff}
  #video .section-sub{color:#888;margin:0 auto 40px}
  .video-frame{max-width:860px;margin:0 auto;border:2px solid var(--accent);border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(204,0,0,.25)}
  .video-frame-label{background:var(--accent);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:10px}
  .video-frame-label span{color:#fff;font-weight:700;font-size:.8rem;letter-spacing:3px;text-transform:uppercase}
  .video-frame-label .play-icon{width:22px;height:22px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .video-frame-label .play-icon svg{width:10px;height:10px;fill:var(--accent);margin-left:2px}
  .video-wrap{position:relative;aspect-ratio:16/9;background:#111}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
  .video-cta{display:inline-block;margin-top:32px;border:2px solid #fff;color:#fff;padding:13px 36px;border-radius:8px;font-weight:700;font-size:.9rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;transition:all .2s}
  .video-cta:hover{background:#fff;color:#000}

  /* ABOUT */
  #about{background:var(--light)}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;margin-top:48px}
  .about-img{border-radius:12px;overflow:hidden;aspect-ratio:4/3}
  .about-img img{width:100%;height:100%;object-fit:cover}
  .about-text p{color:#444;line-height:1.8;font-size:.97rem;margin-bottom:14px}
  .signature{font-weight:700;color:var(--dark);font-size:.95rem;margin-top:4px}
  .about-features{margin-top:28px;display:flex;flex-direction:column;gap:12px}
  .feature{display:flex;align-items:center;gap:12px;font-weight:600;font-size:.95rem}
  .feature-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0}

  /* GALLERY */
  #gallery{background:#fff}
  .slideshow{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:16/7;background:#111;user-select:none;margin-bottom:24px}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity .6s}
  .slide.active{opacity:1}
  .slide img{width:100%;height:100%;object-fit:cover;display:block}
  .slide-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
  .slide-btn:hover{background:var(--accent)}
  .slide-btn.prev{left:16px} .slide-btn.next{right:16px}
  .slide-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:background .2s,transform .2s}
  .dot.active{background:#fff;transform:scale(1.3)}
  .map-wrap{border-radius:14px;overflow:hidden;height:300px;border:1px solid var(--border)}
  .map-wrap iframe{width:100%;height:100%;border:none;display:block}

  /* CLASSES */
  #classes{background:#111}
  #classes .section-label{color:var(--accent)}
  #classes .section-title{color:#fff}
  #classes .section-sub{color:#888}
  .classes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
  .class-card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s}
  .class-card:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.35)}
  .class-img{position:relative;height:220px;overflow:hidden}
  .class-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
  .class-card:hover .class-img img{transform:scale(1.05)}
  .new-badge{position:absolute;top:0;left:0;background:var(--accent);color:#fff;font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 28px;clip-path:polygon(0 0,100% 0,80% 100%,0 100%)}
  .class-body{padding:20px 22px 24px;flex:1;display:flex;flex-direction:column}
  .class-name{font-size:1.05rem;font-weight:900;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
  .class-tags{font-size:.78rem;font-style:italic;color:var(--gray);margin-bottom:10px}
  .class-tags::before{content:'• ';color:var(--accent);font-style:normal;font-weight:700}
  .class-desc{font-size:.88rem;color:#555;line-height:1.65;flex:1}

  /* OFFERS */
  #offers{background:var(--light)}
  .trial-banner{background:#111;border-radius:14px;padding:36px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-top:48px;border:2px solid var(--accent);position:relative;overflow:hidden}
  .trial-banner::after{content:'';position:absolute;top:0;right:0;width:260px;height:100%;background:linear-gradient(to left,rgba(204,0,0,.12),transparent);pointer-events:none}
  .trial-label{font-size:.72rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .trial-title{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:8px}
  .trial-checks{display:flex;gap:20px;flex-wrap:wrap}
  .trial-check{color:#aaa;font-size:.9rem;display:flex;align-items:center;gap:7px}
  .trial-check b{color:var(--accent)}
  .offers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:20px}
  .offer-card{background:#fff;border-radius:12px;padding:32px 24px;border:1px solid var(--border);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;display:flex;flex-direction:column}
  .offer-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.08)}
  .offer-card.popular{border:2px solid var(--accent)}
  .popular-badge{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-bottom-left-radius:10px}
  .offer-name{font-size:.75rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:12px}
  .offer-price{font-size:2.4rem;font-weight:900;letter-spacing:-1px;line-height:1}
  .offer-price span{font-size:.9rem;font-weight:600;color:var(--gray)}
  .offer-price-note{font-size:.78rem;color:var(--gray);margin-top:4px}
  .offer-desc{color:var(--gray);font-size:.88rem;margin:10px 0 20px;line-height:1.6}
  .offer-features{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:28px;flex:1}
  .offer-features li{font-size:.88rem;color:#444;display:flex;align-items:flex-start;gap:10px;line-height:1.4}
  .offer-features li::before{content:'✓';color:var(--accent);font-weight:700;font-size:.85rem;flex-shrink:0;margin-top:1px}
  .offer-features li.cross::before{content:'✗';color:#bbb}
  .offer-btn{display:block;text-align:center;padding:12px;border-radius:6px;font-weight:700;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;text-decoration:none;border:2px solid var(--dark);color:var(--dark);transition:all .2s;margin-top:auto}
  .offer-btn:hover,.offer-card.popular .offer-btn{background:var(--accent);border-color:var(--accent);color:#fff}

  /* REVIEWS */
  #reviews{background:#fff}
  .reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
  .review-card{background:var(--light);border-radius:12px;padding:28px;border:1px solid var(--border);display:flex;flex-direction:column;gap:14px;transition:transform .2s,box-shadow .2s}
  .review-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.07)}
  .review-stars{color:var(--accent);font-size:1rem;letter-spacing:2px}
  .review-text{color:#444;font-size:.93rem;line-height:1.7;flex:1;font-style:italic}
  .review-author{display:flex;align-items:center;gap:12px;margin-top:4px}
  .review-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .review-name{font-weight:700;font-size:.9rem}
  .review-meta{font-size:.78rem;color:var(--gray)}

  /* CTA */
  #cta{background:#111;text-align:center}
  #cta .section-title{color:#fff}
  #cta .section-sub{color:#aaa;margin:0 auto 40px}
  .cta-info{display:flex;justify-content:center;gap:40px;margin-top:56px;flex-wrap:wrap}
  .cta-item{color:#aaa;font-size:.9rem;text-align:center}
  .cta-item strong{display:block;color:#fff;font-size:1rem;margin-bottom:6px}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:480px;overflow:hidden;transform:translateY(24px);transition:transform .25s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-header{background:#111;padding:28px 32px 24px;position:relative}
  .modal-header h3{color:#fff;font-size:1.4rem;font-weight:900;letter-spacing:1px}
  .modal-header p{color:#888;font-size:.88rem;margin-top:4px}
  .modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#666;font-size:1.4rem;cursor:pointer;transition:color .2s;line-height:1}
  .modal-close:hover{color:#fff}
  .modal-body{padding:28px 32px 32px}
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;margin-bottom:6px}
  .form-group input,.form-group select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;color:var(--dark);outline:none;transition:border-color .2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .modal-submit{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:8px;font-weight:700;font-size:.95rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity .2s}
  .modal-submit:hover{opacity:.85}
  .modal-success{text-align:center;padding:48px 32px}
  .modal-success .check{font-size:3rem;margin-bottom:16px}
  .modal-success h3{font-size:1.3rem;font-weight:900;margin-bottom:8px}
  .modal-success p{color:var(--gray);font-size:.95rem;line-height:1.6}

  /* FOOTER */
  footer{background:#000;padding:32px 24px}
  .footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
  footer p{color:#555;font-size:.8rem}

  /* RESPONSIVE */
  @media(max-width:900px){
    .offers-grid{grid-template-columns:repeat(2,1fr)}
    .classes-grid{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:768px){
    .nav-links,.nav-cta{display:none}
    .hamburger{display:flex}
    .about-grid{grid-template-columns:1fr}
    .classes-grid{grid-template-columns:1fr}
    .offers-grid{grid-template-columns:1fr}
    .reviews-grid{grid-template-columns:1fr}
    .footer-inner{flex-direction:column;text-align:center}
    .slideshow{aspect-ratio:4/3}
    .hero-badge{font-size:.68rem;padding:6px 14px}
    .trial-banner{padding:28px 24px}
    .trial-title{font-size:1.5rem}
    .form-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <svg height="46" width="auto" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#000"/>
      <path d="M48,44 L152,44 L177,103 Q156,172 100,190 Q44,172 23,103 Z" fill="none" stroke="#9B1111" stroke-width="7" stroke-linejoin="round"/>
      <rect x="25" y="93" width="150" height="6" rx="3" fill="#9B1111"/>
      <rect x="25" y="79" width="8" height="34" rx="2" fill="#9B1111"/>
      <rect x="35" y="84" width="11" height="24" rx="2" fill="#9B1111"/>
      <rect x="154" y="84" width="11" height="24" rx="2" fill="#9B1111"/>
      <rect x="167" y="79" width="8" height="34" rx="2" fill="#9B1111"/>
      <path d="M76,97 Q76,69 100,69 Q124,69 124,97" fill="none" stroke="#9B1111" stroke-width="12" stroke-linecap="round"/>
      <circle cx="100" cy="117" r="27" fill="#9B1111"/>
      <text x="100" y="164" text-anchor="middle" fill="white" font-weight="900" font-size="46" font-family="Arial Black,Impact,sans-serif" letter-spacing="1">DRVN</text>
    </svg>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#classes">Lessen</a></li>
      <li><a href="#offers">Memberships</a></li>
      <li><a href="#cta">Contact</a></li>
    </ul>
    <a href="#offers" class="nav-cta">Join Now</a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mob-nav" id="mobNav">
  <a href="#about" onclick="closeMenu()">About</a>
  <a href="#gallery" onclick="closeMenu()">Gallery</a>
  <a href="#classes" onclick="closeMenu()">Lessen</a>
  <a href="#offers" onclick="closeMenu()">Memberships</a>
  <a href="#cta" onclick="closeMenu()">Contact</a>
  <a href="#offers" class="mob-cta" onclick="closeMenu()">Join Now</a>
</div>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-tag">Est. 2025 · Lanaken</div>
    <h1 class="hero-title">DRVN</h1>
    <p class="hero-sub">Functional fitness, strength &amp; conditioning.</p>
    <a href="#offers" class="btn">Join Now</a>
    <a href="#about" class="btn btn-outline">Learn More</a>
  </div>
  <div class="hero-bottom">
    <div class="hero-badge"><span class="bv">15+</span> Lessen / Week</div>
    <div class="hero-badge"><span class="bv">4.5★</span> Beoordeling</div>
    <div class="hero-badge">Official HYROX Training Club</div>
    <div class="hero-badge">ZEUZ Partner</div>
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="container">
    <div class="section-label fi">Bekijk de gym</div>
    <h2 class="section-title fi fi-d1">Ervaar DRVN van binnenuit</h2>
    <p class="section-sub fi fi-d2">Ontdek onze gym, onze aanpak en zie hoe een gratis proefles eruitziet. Kom binnen, kijk rond en voel de sfeer — voor elk niveau, zonder drempel.</p>
    <div class="video-frame fi fi-d3">
      <div class="video-frame-label">
        <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <span>Bekijk de video</span>
      </div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/vc1E5CfRfos?rel=0&modestbranding=1" title="DRVN Gym" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <a href="#offers" class="video-cta fi fi-d4" onclick="openModal('Gratis Proefles');return false;">Gratis proefles</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-img fi">
        <img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=800&auto=format&fit=crop" alt="Inside DRVN Gym"/>
      </div>
      <div class="about-text fi fi-d2">
        <div class="section-label">About Us</div>
        <h2 class="section-title">Everything is earned,<br>nothing is given.<br><em style="color:var(--accent);font-style:normal">Be DRVN.</em></h2>
        <p>Bij DRVN geloven we dat consistente training niet ontstaat uit motivatie alleen, maar uit de omgeving waarin je traint. Daarom bouwen we bewust aan een sterke community. Wanneer je samen traint, vaste momenten deelt en elkaar blijft zien, wordt volhouden vanzelf makkelijker.</p>
        <p>We brengen mensen samen die dezelfde doelen nastreven. Dat zorgt voor herkenning, onderlinge motivatie en een sfeer waarin iedereen elkaar vooruit helpt. Je staat er niet alleen voor — je traint in een omgeving waar groei normaal is en waar iedereen elkaar sterker maakt.</p>
        <p>Voor ons gaat community verder dan samen trainen. Het maakt het proces leuker, menselijker en duurzamer. Bij DRVN train je niet alleen voor resultaat op korte termijn, maar bouw je aan gewoontes die je volhoudt op lange termijn.</p>
